packages:
    - apps/*
    - packages/*
    - scripts/ts-api-extractor
    - scripts/sync-figma

# Unified React 19 for entire monorepo
# Libraries (packages/*) maintain peerDependencies for React 17/18/19 compatibility
catalog:
    react: ^19.2.7
    react-dom: ^19.2.7
    '@types/react': ^19.2.17
    '@types/react-dom': ^19.2.3
    typescript: ^5.9.3
    eslint: ^9.39.4
