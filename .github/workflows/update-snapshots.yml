name: "Update Visual Snapshots"

on:
    workflow_dispatch:

jobs:
    update-snapshots:
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.60.0-noble
            options: --user 1001
        env:
            PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
        steps:
            - name: Git clone the repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Dependencies
              uses: ./.github/composite/install

            - name: Configure Git
              run: |
                  git config user.name "$(git log -n 1 --pretty=format:%an)"
                  git config user.email "$(git log -n 1 --pretty=format:%ae)"

            - name: Build Icons
              run: pnpm icons build

            - name: Build Storybook
              run: pnpm build:storybook

            - name: Take a snapshot
              run: |
                  pnpm core test:regressions --update-snapshots
                  git add packages/core/__tests__/screenshots
                  git diff --exit-code || git commit -m 'ci: update snapshots'

            - name: Update Snapshots
              uses: ad-m/github-push-action@master
              with:
                  github_token: ${{ secrets.VAPOR_BOT_TOKEN }}
                  branch: ${{ github.ref_name }}
