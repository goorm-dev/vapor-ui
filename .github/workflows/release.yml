name: "Release Packages"

on:
    push:
        paths:
            - ".changeset/**"
            - "packages/**"
        branches:
            - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
    VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
    release:
        outputs:
            published: ${{ steps.changesets.outputs.published }}
            publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
        name: Release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout branch
              uses: actions/checkout@v4

            - name: Install
              uses: ./.github/composite/install

            - name: Create .npmrc file
              run: |
                  cat << EOF > "$HOME/.npmrc"
                    //registry.npmjs.org/:_authToken=${NPM_TOKEN}
                  EOF
              env:
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create Release Pull Request or Publish to npm
              id: changesets
              uses: changesets/action@v1
              with:
                  publish: pnpm run release
                  version: pnpm run version
                  commit: "ci(changesets): version packages"
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Update Release Notes
              if: steps.changesets.outputs.published == 'false'
              run: pnpm run version:release-note

            - name: Commit Changes
              if: steps.changesets.outputs.published == 'false'
              run: |
                  if [[ -n $(git status --porcelain) ]]; then
                      git add apps/website/content/docs/releases
                      git commit -m "docs: update release notes"
                      git push --set-upstream origin changeset-release/main
                  fi

    promote-docs:
        needs: release
        if: needs.release.outputs.published == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Install Vercel CLI
              run: npm install -g vercel@^50

            - name: Wait for Staged Production Deployment
              id: wait_for_deployment
              run: |
                  TIMEOUT_SECONDS=300
                  INTERVAL_SECONDS=10
                  ELAPSED_SECONDS=0

                  while [ "$ELAPSED_SECONDS" -lt "$TIMEOUT_SECONDS" ]; do
                      RESPONSE=$(curl -fsS \
                          -H "Authorization: Bearer $VERCEL_TOKEN" \
                          "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&sha=${{ github.sha }}&target=production&limit=1&teamId=$VERCEL_ORG_ID")

                      STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // empty')
                      DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.deployments[0].uid // empty')
                      READY_SUBSTATE=$(echo "$RESPONSE" | jq -r '.deployments[0].readySubstate // empty')

                      if [ "$STATE" = "READY" ] && [ -n "$DEPLOYMENT_ID" ]; then
                          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
                          echo "ready_substate=$READY_SUBSTATE" >> "$GITHUB_OUTPUT"
                          exit 0
                      fi

                      if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
                          echo "Deployment for commit ${{ github.sha }} failed with state $STATE"
                          exit 1
                      fi

                      echo "Waiting for deployment for ${{ github.sha }}. Current state: ${STATE:-not found}"
                      sleep "$INTERVAL_SECONDS"
                      ELAPSED_SECONDS=$((ELAPSED_SECONDS + INTERVAL_SECONDS))
                  done

                  echo "Timed out waiting for a READY production deployment for commit ${{ github.sha }}"
                  exit 1

            - name: Promote Deployment to Production
              if: steps.wait_for_deployment.outputs.ready_substate != 'PROMOTED'
              run: vercel promote $DEPLOYMENT_ID --yes
              env:
                  DEPLOYMENT_ID: ${{ steps.wait_for_deployment.outputs.deployment_id }}

    notify:
        needs: [release, promote-docs]
        if: needs.release.outputs.published == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout branch
              uses: actions/checkout@v4

            - name: Install
              uses: ./.github/composite/install

            - name: Send Slack Notification
              run: pnpm run release:slack
              env:
                  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
                  PUBLISHED_PACKAGES: ${{ needs.release.outputs.publishedPackages }}
